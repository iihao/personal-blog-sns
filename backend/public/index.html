<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘 - 博客管理后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/admin/admin-layout.css">
    <script src="/admin/admin.js" defer></script>
    <style>
        :root {
            --primary: #007aff;
            --primary-dark: #0056b3;
            --success: #34c759;
            --danger: #ff3b30;
            --warning: #ff9500;
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --border: #e0e0e0;
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --radius: 16px;
            --shadow: 0 4px 16px rgba(0,0,0,0.08);
        }

        /* 统计卡片网格 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .stat-icon.blue { background: linear-gradient(135deg, rgba(0,122,255,0.2), rgba(0,122,255,0.1)); color: var(--primary); }
        .stat-icon.green { background: linear-gradient(135deg, rgba(52,199,89,0.2), rgba(52,199,89,0.1)); color: var(--success); }
        .stat-icon.orange { background: linear-gradient(135deg, rgba(255,149,0,0.2), rgba(255,149,0,0.1)); color: var(--warning); }
        .stat-icon.red { background: linear-gradient(135deg, rgba(255,59,48,0.2), rgba(255,59,48,0.1)); color: var(--danger); }
        .stat-icon.purple { background: linear-gradient(135deg, rgba(175,82,222,0.2), rgba(175,82,222,0.1)); color: #af52de; }

        .stat-info {
            flex: 1;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--text);
            line-height: 1;
            margin-bottom: 6px;
        }

        .stat-label {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .stat-change {
            font-size: 12px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-change.positive { color: var(--success); }
        .stat-change.negative { color: var(--danger); }

        /* 快捷操作 */
        .quick-actions {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: var(--shadow);
            margin-bottom: 32px;
        }

        .quick-actions h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
        }

        .action-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 24px;
            background: var(--bg);
            border-radius: 12px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .action-card:hover {
            background: rgba(0, 122, 255, 0.08);
            border-color: var(--primary);
            transform: translateY(-4px);
        }

        .action-card i {
            font-size: 32px;
            color: var(--primary);
        }

        .action-card span {
            font-weight: 600;
            font-size: 14px;
        }

        /* 最近文章 */
        .recent-section {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: var(--shadow);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
        }

        .article-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .article-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: var(--bg);
            border-radius: 12px;
            transition: all 0.2s;
            text-decoration: none;
            color: var(--text);
            border: 1px solid transparent;
        }

        .article-item:hover {
            background: rgba(0, 122, 255, 0.08);
            border-color: rgba(0, 122, 255, 0.2);
            transform: translateX(4px);
        }

        .article-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .article-status.published {
            background: var(--success);
            box-shadow: 0 0 8px rgba(52, 199, 89, 0.5);
        }

        .article-status.draft {
            background: var(--warning);
            box-shadow: 0 0 8px rgba(255, 149, 0, 0.5);
        }

        .article-info {
            flex: 1;
            min-width: 0;
        }

        .article-title {
            font-weight: 600;
            font-size: 15px;
            color: var(--text);
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .article-meta {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .article-date {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .article-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .article-status.published { background: var(--success); }
        .article-status.draft { background: var(--warning); }

        .article-info {
            flex: 1;
        }

        .article-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .article-meta {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .article-date {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .loading i {
            font-size: 32px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 移动端菜单按钮 -->
    <button class="menu-toggle" aria-label="切换菜单">
        <span></span>
        <span></span>
        <span></span>
    </button>
    
    <!-- 遮罩层 -->
    <div class="sidebar-overlay"></div>
    
    <div class="dashboard-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-pen-fancy"></i>
                </div>
                <span class="logo-text">博客管理</span>
            </div>

            <nav class="nav-section">
                <div class="nav-section-title">内容管理</div>
                <a href="/admin/" class="nav-item active">
                    <i class="fas fa-home"></i>
                    <span>仪表盘</span>
                </a>
                <a href="/admin/articles.html" class="nav-item">
                    <i class="fas fa-newspaper"></i>
                    <span>文章管理</span>
                </a>
                <a href="/admin/media.html" class="nav-item">
                    <i class="fas fa-images"></i>
                    <span>媒体库</span>
                </a>
                <a href="/admin/comments.html" class="nav-item">
                    <i class="fas fa-comments"></i>
                    <span>评论管理</span>
                </a>
            </nav>

            <nav class="nav-section">
                <div class="nav-section-title">系统</div>
                <a href="/admin/settings.html" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>系统设置</span>
                </a>
                <a href="/" class="nav-item" target="_blank">
                    <i class="fas fa-external-link-alt"></i>
                    <span>查看站点</span>
                </a>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <div class="main-wrapper">
            <div class="page-header">
                <h1 class="page-title">
                    <i class="fas fa-chart-line"></i>
                    仪表盘
                </h1>
                <div class="header-actions">
                    <button class="btn btn-outline" onclick="loadDashboard()">
                        <i class="fas fa-sync"></i> 刷新
                    </button>
                </div>
            </div>

            <!-- 统计卡片 -->
            <div class="stats-grid">
                <div class="stat-card" onclick="location.href='/admin/articles.html'">
                    <div class="stat-icon blue">
                        <i class="fas fa-newspaper"></i>
                    </div>
                    <div class="stat-info">
                        <div class="stat-value" id="stat-total">-</div>
                        <div class="stat-label">文章总数</div>
                        <div class="stat-change positive">
                            <i class="fas fa-arrow-up"></i> 全部文章
                        </div>
                    </div>
                </div>

                <div class="stat-card" onclick="location.href='/admin/articles.html?status=published'">
                    <div class="stat-icon green">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="stat-info">
                        <div class="stat-value" id="stat-published">-</div>
                        <div class="stat-label">已发布</div>
                        <div class="stat-change positive">
                            <i class="fas fa-globe"></i> 在线文章
                        </div>
                    </div>
                </div>

                <div class="stat-card" onclick="location.href='/admin/articles.html?status=draft'">
                    <div class="stat-icon orange">
                        <i class="fas fa-file"></i>
                    </div>
                    <div class="stat-info">
                        <div class="stat-value" id="stat-drafts">-</div>
                        <div class="stat-label">草稿</div>
                        <div class="stat-change">
                            <i class="fas fa-edit"></i> 待编辑
                        </div>
                    </div>
                </div>

                <div class="stat-card" onclick="location.href='/admin/comments.html'">
                    <div class="stat-icon red">
                        <i class="fas fa-comments"></i>
                    </div>
                    <div class="stat-info">
                        <div class="stat-value" id="stat-comments">-</div>
                        <div class="stat-label">评论总数</div>
                        <div class="stat-change">
                            <i class="fas fa-clock"></i> 待审核
                        </div>
                    </div>
                </div>

                <div class="stat-card" onclick="location.href='/admin/media.html'">
                    <div class="stat-icon purple">
                        <i class="fas fa-images"></i>
                    </div>
                    <div class="stat-info">
                        <div class="stat-value" id="stat-media">-</div>
                        <div class="stat-label">媒体文件</div>
                        <div class="stat-change">
                            <i class="fas fa-upload"></i> 已上传
                        </div>
                    </div>
                </div>
            </div>

            <!-- 快捷操作 -->
            <div class="quick-actions">
                <h2>
                    <i class="fas fa-bolt"></i>
                    快捷操作
                </h2>
                <div class="action-grid">
                    <a href="/admin/editor.html" class="action-card">
                        <i class="fas fa-plus-circle"></i>
                        <span>新建文章</span>
                    </a>
                    <a href="/admin/articles.html" class="action-card">
                        <i class="fas fa-edit"></i>
                        <span>管理文章</span>
                    </a>
                    <a href="/admin/media.html" class="action-card">
                        <i class="fas fa-upload"></i>
                        <span>上传媒体</span>
                    </a>
                    <a href="/admin/comments.html" class="action-card">
                        <i class="fas fa-comment-dots"></i>
                        <span>查看评论</span>
                    </a>
                </div>
            </div>

            <!-- 最近文章 -->
            <div class="recent-section">
                <div class="section-header">
                    <h2 class="section-title">
                        <i class="fas fa-history"></i>
                        最近文章
                    </h2>
                    <a href="/admin/articles.html" class="btn btn-outline">
                        查看全部 <i class="fas fa-arrow-right"></i>
                    </a>
                </div>
                <div class="article-list" id="recent-articles">
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>加载中...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 页面加载完成后立即执行
        (function() {
            console.log('=== 仪表盘初始化 ===');
            
            // 等待 DOM 完全加载
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
            
            async function init() {
                console.log('DOM 就绪，开始加载数据...');
                try {
                    await loadStats();
                    await loadRecentArticles();
                    console.log('=== 仪表盘加载完成 ===');
                } catch (error) {
                    console.error('初始化失败:', error);
                }
            }
        })();

        // 加载统计数据
        async function loadStats() {
            console.log('[loadStats] 开始...');
            try {
                // 获取文章数据
                console.log('[loadStats] 请求 /api/posts');
                const res = await fetch('/api/posts');
                console.log('[loadStats] 响应状态:', res.status);
                
                if (!res.ok) throw new Error('文章 API 失败');
                
                const data = await res.json();
                console.log('[loadStats] 文章数据:', data);
                
                const posts = data.posts || [];
                const total = posts.length;
                const published = posts.filter(p => p && p.status === 'published').length;
                const drafts = posts.filter(p => p && p.status === 'draft').length;
                
                console.log('[loadStats] 统计:', { total, published, drafts });
                
                // 更新 DOM
                setText('stat-total', total);
                setText('stat-published', published);
                setText('stat-drafts', drafts);
                
                // 获取评论数据
                console.log('[loadStats] 请求 /api/comments');
                const commentsRes = await fetch('/api/comments');
                const commentsData = await commentsRes.json();
                const comments = commentsData.comments || [];
                
                console.log('[loadStats] 评论数:', comments.length);
                setText('stat-comments', comments.length);
                setText('stat-media', '0');
                
                console.log('[loadStats] 完成');
            } catch (err) {
                console.error('[loadStats] 错误:', err);
            }
        }
        
        // 辅助函数：安全设置文本
        function setText(id, text) {
            const el = document.getElementById(id);
            if (el) {
                el.textContent = text;
                console.log(`[setText] ${id} = ${text}`);
            } else {
                console.warn(`[setText] 未找到元素：${id}`);
            }
        }

        // 加载最近文章
        async function loadRecentArticles() {
            console.log('=== 加载最近文章 ===');
            try {
                const res = await fetch('/api/posts');
                console.log('API 状态:', res.status);
                
                if (!res.ok) throw new Error('API 失败：' + res.status);
                
                const data = await res.json();
                console.log('API 数据:', data);
                
                const posts = (data.posts || []).slice(0, 5);
                console.log('文章数量:', posts.length);
                if (posts.length > 0) {
                    console.log('第一篇文章:', posts[0]);
                }
                
                const container = document.getElementById('recent-articles');
                console.log('容器元素:', container ? '找到' : '未找到');
                
                if (!container) {
                    console.error('❌ 容器未找到');
                    return;
                }
                
                if (posts.length === 0) {
                    console.log('无文章');
                    container.innerHTML = '<div class="loading"><p>暂无文章</p></div>';
                    return;
                }
                
                const html = posts.map((post, index) => {
                    const status = post && post.status === 'published' ? 'published' : 'draft';
                    const title = (post && post.title) ? escapeHtml(post.title) : '无标题';
                    const author = (post && post.author) ? escapeHtml(post.author) : 'Admin';
                    const category = (post && post.category) ? ` • <i class="fas fa-folder"></i> ${escapeHtml(post.category)}` : '';
                    const date = (post && post.created_at) ? formatDate(post.created_at) : '';
                    const id = (post && post.id) ? post.id : 0;
                    
                    console.log(`文章${index}:`, { id, title, status });
                    
                    return `
                        <a href="/admin/editor.html?id=${id}" class="article-item">
                            <div class="article-status ${status}"></div>
                            <div class="article-info">
                                <div class="article-title">${title}</div>
                                <div class="article-meta">
                                    <i class="fas fa-user"></i> ${author}${category}
                                </div>
                            </div>
                            <div class="article-date">${date}</div>
                        </a>
                    `;
                }).join('');
                
                console.log('生成 HTML 长度:', html.length);
                container.innerHTML = html;
                console.log('✅ 渲染完成');
                console.log('容器内 HTML:', container.innerHTML.substring(0, 200));
                
            } catch (err) {
                console.error('❌ 错误:', err);
                const container = document.getElementById('recent-articles');
                if (container) {
                    container.innerHTML = `<div class="loading"><p>加载失败：${err.message}</p></div>`;
                }
            }
        }
        
        // 转义 HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            const days = Math.floor(diff / 86400000);
            
            if (days === 0) return '今天';
            if (days === 1) return '昨天';
            if (days < 7) return `${days}天前`;
            
            return date.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' });
        }
    </script>
</body>
</html>
