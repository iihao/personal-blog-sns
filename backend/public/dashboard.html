<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客管理后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #007aff;
            --primary-dark: #0056b3;
            --success: #34c759;
            --danger: #ff3b30;
            --warning: #ff9500;
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --border: #e0e0e0;
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --radius: 16px;
            --shadow: 0 4px 16px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .dashboard {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            background: var(--card-bg);
            border-right: 1px solid var(--border);
            padding: 32px 24px;
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            overflow-y: auto;
            z-index: 1000;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
        }

        .nav-section {
            margin-bottom: 32px;
        }

        .nav-section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            padding-left: 12px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text);
            text-decoration: none;
            transition: all 0.2s ease;
            margin-bottom: 4px;
        }

        .nav-item:hover {
            background: rgba(0, 122, 255, 0.08);
            color: var(--primary);
        }

        .nav-item.active {
            background: linear-gradient(135deg, rgba(0, 122, 255, 0.15), rgba(0, 122, 255, 0.08));
            color: var(--primary);
            font-weight: 600;
        }

        .nav-item i {
            width: 20px;
            text-align: center;
            font-size: 16px;
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            padding: 40px;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: var(--shadow);
            transition: transform 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 16px;
        }

        .stat-icon.blue { background: rgba(0, 122, 255, 0.15); color: var(--primary); }
        .stat-icon.green { background: rgba(52, 199, 89, 0.15); color: var(--success); }
        .stat-icon.orange { background: rgba(255, 149, 0, 0.15); color: var(--warning); }
        .stat-icon.red { background: rgba(255, 59, 48, 0.15); color: var(--danger); }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }

        /* Quick Actions */
        .quick-actions {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: var(--shadow);
            margin-bottom: 40px;
        }

        .quick-actions h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 24px;
            background: var(--bg);
            border-radius: 12px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        .action-btn:hover {
            background: rgba(0, 122, 255, 0.08);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .action-btn i {
            font-size: 28px;
            color: var(--primary);
        }

        .action-btn span {
            font-weight: 600;
            font-size: 14px;
        }

        /* Recent Activity */
        .recent-activity {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: var(--shadow);
        }

        .recent-activity h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: var(--bg);
            border-radius: 12px;
            transition: background 0.2s;
        }

        .activity-item:hover {
            background: rgba(0, 122, 255, 0.08);
        }

        .activity-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .activity-info {
            flex: 1;
        }

        .activity-title {
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }

        .activity-time {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .dashboard {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .main-content {
                margin-left: 0;
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-pen-fancy"></i>
                </div>
                <span class="logo-text">博客管理</span>
            </div>

            <nav class="nav-section">
                <div class="nav-section-title">内容管理</div>
                <a href="/admin/" class="nav-item active">
                    <i class="fas fa-home"></i>
                    <span>仪表盘</span>
                </a>
                <a href="/admin/articles.html" class="nav-item">
                    <i class="fas fa-newspaper"></i>
                    <span>文章管理</span>
                </a>
                <a href="/admin/media.html" class="nav-item">
                    <i class="fas fa-images"></i>
                    <span>媒体库</span>
                </a>
                <a href="/admin/comments.html" class="nav-item">
                    <i class="fas fa-comments"></i>
                    <span>评论管理</span>
                </a>
            </nav>

            <nav class="nav-section">
                <div class="nav-section-title">系统</div>
                <a href="/admin/settings.html" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>系统设置</span>
                </a>
                <a href="/" class="nav-item" target="_blank">
                    <i class="fas fa-external-link-alt"></i>
                    <span>查看站点</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="header">
                <h1>仪表盘</h1>
                <div class="user-menu">
                    <div class="user-avatar">A</div>
                    <span>Admin</span>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-grid" id="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon blue">
                        <i class="fas fa-newspaper"></i>
                    </div>
                    <div class="stat-value" id="stat-posts">-</div>
                    <div class="stat-label">文章总数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="stat-value" id="stat-published">-</div>
                    <div class="stat-label">已发布</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon orange">
                        <i class="fas fa-file"></i>
                    </div>
                    <div class="stat-value" id="stat-drafts">-</div>
                    <div class="stat-label">草稿</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon red">
                        <i class="fas fa-comments"></i>
                    </div>
                    <div class="stat-value" id="stat-comments">-</div>
                    <div class="stat-label">评论数</div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="quick-actions">
                <h2><i class="fas fa-bolt"></i> 快捷操作</h2>
                <div class="action-buttons">
                    <a href="/admin/editor.html" class="action-btn">
                        <i class="fas fa-plus"></i>
                        <span>新建文章</span>
                    </a>
                    <a href="/admin/articles.html" class="action-btn">
                        <i class="fas fa-edit"></i>
                        <span>管理文章</span>
                    </a>
                    <a href="/admin/media.html" class="action-btn">
                        <i class="fas fa-upload"></i>
                        <span>上传媒体</span>
                    </a>
                    <a href="/admin/comments.html" class="action-btn">
                        <i class="fas fa-comment-dots"></i>
                        <span>查看评论</span>
                    </a>
                </div>
            </div>

            <!-- Recent Activity -->
            <div class="recent-activity">
                <h2><i class="fas fa-history"></i> 最近活动</h2>
                <div class="activity-list" id="activity-list">
                    <div class="activity-item">
                        <div class="activity-icon" style="background: rgba(0,122,255,0.15); color: #007aff;">
                            <i class="fas fa-newspaper"></i>
                        </div>
                        <div class="activity-info">
                            <div class="activity-title">系统就绪</div>
                            <div class="activity-time">博客管理系统已启动</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Load statistics
        async function loadStats() {
            try {
                const response = await fetch('/api/posts/stats');
                const stats = await response.json();
                
                document.getElementById('stat-posts').textContent = stats.total || 0;
                document.getElementById('stat-published').textContent = stats.published || 0;
                document.getElementById('stat-drafts').textContent = stats.drafts || 0;
                
                // Load comments count
                const commentsResponse = await fetch('/api/comments');
                const commentsData = await commentsResponse.json();
                document.getElementById('stat-comments').textContent = (commentsData.comments || []).length;
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', loadStats);
    </script>
</body>
</html>
