<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最近文章测试</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f7; }
        .article-list { background: white; border-radius: 16px; padding: 24px; }
        .article-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: #f5f5f7;
            border-radius: 12px;
            margin-bottom: 12px;
            text-decoration: none;
            color: #1d1d1f;
        }
        .article-item:hover { background: rgba(0,122,255,0.08); }
        .article-status { width: 10px; height: 10px; border-radius: 50%; }
        .article-status.published { background: #34c759; }
        .article-status.draft { background: #ff9500; }
        .article-info { flex: 1; }
        .article-title { font-weight: 600; margin-bottom: 4px; }
        .article-meta { font-size: 13px; color: #86868b; }
        .article-date { font-size: 13px; color: #86868b; }
        .debug { background: #fff; padding: 15px; border-radius: 8px; margin-top: 20px; font-size: 12px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>最近文章测试</h1>
    <div id="loading">加载中...</div>
    <div class="article-list" id="recent-articles" style="display:none;"></div>
    <div class="debug" id="debug"></div>

    <script>
        const log = (msg) => {
            const el = document.getElementById('debug');
            el.textContent += msg + '\n';
            console.log(msg);
        };

        async function test() {
            try {
                log('1. 开始请求 API...');
                const res = await fetch('/api/posts');
                log('2. 响应状态：' + res.status);
                
                const data = await res.json();
                log('3. 收到数据：' + JSON.stringify(data, null, 2).substring(0, 500));
                
                const posts = (data.posts || []).slice(0, 5);
                log('4. 文章数量：' + posts.length);
                
                const container = document.getElementById('recent-articles');
                if (!container) {
                    log('❌ 容器未找到！');
                    return;
                }
                
                if (posts.length === 0) {
                    container.innerHTML = '<div>暂无文章</div>';
                    return;
                }
                
                const html = posts.map(post => {
                    log('处理文章：' + post.title + ' (status: ' + post.status + ')');
                    const status = post.status === 'published' ? 'published' : 'draft';
                    return `
                        <a href="/admin/editor.html?id=${post.id}" class="article-item">
                            <div class="article-status ${status}"></div>
                            <div class="article-info">
                                <div class="article-title">${escapeHtml(post.title)}</div>
                                <div class="article-meta">
                                    <i class="fas fa-user"></i> ${escapeHtml(post.author || 'Admin')}
                                </div>
                            </div>
                            <div class="article-date">${formatDate(post.created_at)}</div>
                        </a>
                    `;
                }).join('');
                
                container.innerHTML = html;
                document.getElementById('loading').style.display = 'none';
                container.style.display = 'block';
                log('✅ 渲染完成！');
                
            } catch (err) {
                log('❌ 错误：' + err.message);
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            const days = Math.floor(diff / 86400000);
            if (days === 0) return '今天';
            if (days === 1) return '昨天';
            if (days < 7) return days + '天前';
            return date.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' });
        }

        document.addEventListener('DOMContentLoaded', test);
    </script>
</body>
</html>
