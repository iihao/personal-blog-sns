<script>
// 自动激活当前页面对应的导航项
(function() {
    const currentPage = window.location.pathname.split('/').pop().replace('.html', '') || 'dashboard';
    const navItems = document.querySelectorAll('.nav-item[data-page]');

        if (item.dataset.page === currentPage) {
            item.classList.add('active');
        }
    });
})();
