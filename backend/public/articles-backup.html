<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章管理 - 博客管理后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #007aff;
            --primary-dark: #0056b3;
            --success: #34c759;
            --danger: #ff3b30;
            --warning: #ff9500;
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --border: #e0e0e0;
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --radius: 12px;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .header {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }

        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-input {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            min-width: 200px;
        }

        .filter-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .article-list {
            display: grid;
            gap: 16px;
        }

        .article-item {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: all 0.2s;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 16px;
            align-items: start;
        }

        .article-item:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(0,122,255,0.15);
        }

        .article-info h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .article-meta {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-published {
            background: rgba(52, 199, 89, 0.15);
            color: var(--success);
        }

        .status-draft {
            background: rgba(255, 149, 0, 0.15);
            color: var(--warning);
        }

        .article-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .action-btn.edit {
            background: rgba(0, 122, 255, 0.1);
            color: var(--primary);
        }

        .action-btn.delete {
            background: rgba(255, 59, 48, 0.1);
            color: var(--danger);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex !important;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 32px;
            max-width: 800px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }

        .editor-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-bottom: none;
            border-radius: 8px 8px 0 0;
        }

        .toolbar-btn {
            padding: 8px 12px;
            border: 1px solid var(--border);
            background: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .toolbar-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .editor-content {
            min-height: 400px;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 0 0 8px 8px;
            outline: none;
            line-height: 1.8;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--radius);
            text-align: center;
            box-shadow: var(--shadow);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 8px;
        }

        @media (max-width: 768px) {
            .article-item {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-newspaper"></i> 文章管理</h1>
            <div class="header-actions">
                <button class="btn btn-outline" onclick="loadArticles()">
                    <i class="fas fa-sync"></i> 刷新
                </button>
                <a href="/admin/editor.html" class="btn btn-primary" style="text-decoration: none;">
                    <i class="fas fa-plus"></i> 新建文章
                </a>
            </div>
        </div>

        <!-- 统计栏 -->
        <div class="stats-bar" id="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">总文章数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-published">0</div>
                <div class="stat-label">已发布</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-drafts">0</div>
                <div class="stat-label">草稿</div>
            </div>
        </div>

        <div class="card">
            <div class="filters">
                <input type="text" class="filter-input" placeholder="搜索文章..." id="search-input" onkeyup="handleSearch(event)">
                <select class="filter-input" id="status-filter" onchange="loadArticles()">
                    <option value="all">全部状态</option>
                    <option value="published">已发布</option>
                    <option value="draft">草稿</option>
                </select>
            </div>

            <div id="articles-list" class="article-list">
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>加载中...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑器弹窗 -->
    <div id="editor-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">新建文章</h2>
                <button class="close-btn" onclick="closeEditor()">&times;</button>
            </div>
            
            <form id="article-form" onsubmit="saveArticle(event)">
                <input type="hidden" id="article-id">
                
                <div class="form-group">
                    <label class="form-label">文章标题 *</label>
                    <input type="text" id="article-title" class="form-control" required placeholder="输入文章标题...">
                </div>

                <div class="form-group">
                    <label class="form-label">分类</label>
                    <input type="text" id="article-category" class="form-control" placeholder="例如：技术、生活、随笔">
                </div>

                <div class="form-group">
                    <label class="form-label">标签</label>
                    <input type="text" id="article-tags" class="form-control" placeholder="用逗号分隔，例如：Vue, JavaScript, 技术">
                </div>

                <div class="form-group">
                    <label class="form-label">发布状态</label>
                    <select id="article-status" class="form-control">
                        <option value="1">立即发布</option>
                        <option value="0">存为草稿</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">文章内容 *</label>
                    <div class="editor-toolbar">
                        <button type="button" class="toolbar-btn" onclick="formatDoc('bold')" title="加粗">
                            <i class="fas fa-bold"></i>
                        </button>
                        <button type="button" class="toolbar-btn" onclick="formatDoc('italic')" title="斜体">
                            <i class="fas fa-italic"></i>
                        </button>
                        <button type="button" class="toolbar-btn" onclick="formatDoc('underline')" title="下划线">
                            <i class="fas fa-underline"></i>
                        </button>
                        <button type="button" class="toolbar-btn" onclick="formatDoc('strikeThrough')" title="删除线">
                            <i class="fas fa-strikethrough"></i>
                        </button>
                        <button type="button" class="toolbar-btn" onclick="formatDoc('justifyLeft')" title="左对齐">
                            <i class="fas fa-align-left"></i>
                        </button>
                        <button type="button" class="toolbar-btn" onclick="formatDoc('justifyCenter')" title="居中">
                            <i class="fas fa-align-center"></i>
                        </button>
                        <button type="button" class="toolbar-btn" onclick="formatDoc('justifyRight')" title="右对齐">
                            <i class="fas fa-align-right"></i>
                        </button>
                        <button type="button" class="toolbar-btn" onclick="formatDoc('insertUnorderedList')" title="无序列表">
                            <i class="fas fa-list-ul"></i>
                        </button>
                        <button type="button" class="toolbar-btn" onclick="formatDoc('insertOrderedList')" title="有序列表">
                            <i class="fas fa-list-ol"></i>
                        </button>
                        <button type="button" class="toolbar-btn" onclick="formatDoc('createLink', prompt('输入链接地址:', 'https://'))" title="插入链接">
                            <i class="fas fa-link"></i>
                        </button>
                        <button type="button" class="toolbar-btn" onclick="formatDoc('formatBlock', 'h2')" title="标题 2">
                            H2
                        </button>
                        <button type="button" class="toolbar-btn" onclick="formatDoc('formatBlock', 'h3')" title="标题 3">
                            H3
                        </button>
                        <button type="button" class="toolbar-btn" onclick="formatDoc('formatBlock', 'p')" title="段落">
                            P
                        </button>
                    </div>
                    <div id="editor" class="editor-content" contenteditable="true" placeholder="开始写作..."></div>
                </div>

                <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px;">
                    <button type="button" class="btn btn-outline" onclick="closeEditor()">取消</button>
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-save"></i> 保存文章
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentTags = [];

        document.addEventListener('DOMContentLoaded', () => {
            loadArticles();
            loadStats();
        });

        // 加载文章列表
        async function loadArticles() {
            const search = document.getElementById('search-input').value;
            const status = document.getElementById('status-filter').value;
            
            // 使用绝对路径
            const baseUrl = window.location.origin;
            let url = `${baseUrl}/api/posts?page=1&limit=20`;
            if (search) url += `&search=${encodeURIComponent(search)}`;
            if (status !== 'all') url += `&status=${status}`;
            
            console.log('Fetching:', url);
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                const container = document.getElementById('articles-list');
                
                console.log('API Response:', data);
                const posts = data.posts || [];
                
                if (posts.length > 0) {
                    container.innerHTML = posts.map(post => `
                        <div class="article-item">
                            <div class="article-info">
                                <h3>${escapeHtml(post.title)}</h3>
                                <div class="article-meta">
                                    <span><i class="far fa-clock"></i> ${formatDate(post.created_at)}</span>
                                    <span><i class="far fa-user"></i> ${escapeHtml(post.author || 'Admin')}</span>
                                    ${post.category ? `<span><i class="fas fa-folder"></i> ${escapeHtml(post.category)}</span>` : ''}
                                    ${post.tags ? `<span><i class="fas fa-tags"></i> ${escapeHtml(post.tags)}</span>` : ''}
                                </div>
                            </div>
                            <div class="article-actions">
                                <span class="status-badge ${post.published ? 'status-published' : 'status-draft'}">
                                    ${post.published ? '已发布' : '草稿'}
                                </span>
                                <a href="/admin/editor.html?id=${post.id}" class="action-btn edit" style="text-decoration: none; display: inline-block;">
                                    <i class="fas fa-edit"></i> 编辑
                                </a>
                                <button class="action-btn delete" onclick="deleteArticle(${post.id})">
                                    <i class="fas fa-trash"></i> 删除
                                </button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    console.log('No posts found');
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-file-alt"></i>
                            <p>暂无文章</p>
                            <a href="../editor.html" class="btn btn-primary" style="margin-top: 16px; display: inline-block; text-decoration: none;">
                                <i class="fas fa-plus"></i> 创建第一篇文章
                            </a>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Failed to load articles:', error);
                const container = document.getElementById('articles-list');
                if (container) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-exclamation-triangle"></i>
                            <p>加载失败：${error.message}</p>
                            <button class="btn btn-primary" style="margin-top: 16px;" onclick="loadArticles()">
                                <i class="fas fa-sync"></i> 重试
                            </button>
                        </div>
                    `;
                }
            }
        }

        // 加载统计信息
        async function loadStats() {
            try {
                const baseUrl = window.location.origin;
                const response = await fetch(`${baseUrl}/api/posts/stats`);
                const stats = await response.json();
                
                document.getElementById('stat-total').textContent = stats.total || 0;
                document.getElementById('stat-published').textContent = stats.published || 0;
                document.getElementById('stat-drafts').textContent = stats.drafts || 0;
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        // 搜索处理
        function handleSearch(event) {
            if (event.key === 'Enter') {
                loadArticles();
            }
        }

        // 打开编辑器
        function openEditor() {
            console.log('openEditor called');
            const modal = document.getElementById('editor-modal');
            console.log('Modal element:', modal);
            
            document.getElementById('article-form').reset();
            document.getElementById('article-id').value = '';
            document.getElementById('modal-title').textContent = '新建文章';
            document.getElementById('editor').innerHTML = '';
            
            if (modal) {
                modal.classList.add('active');
                modal.style.display = 'flex';
                console.log('Modal opened');
            } else {
                console.error('Modal element not found');
            }
        }

        // 关闭编辑器
        function closeEditor() {
            document.getElementById('editor-modal').classList.remove('active');
        }

        // 编辑文章
        async function editArticle(id) {
            try {
                const response = await fetch(`/api/posts/${id}`);
                const data = await response.json();
                const post = data.post;
                
                document.getElementById('article-id').value = post.id;
                document.getElementById('article-title').value = post.title;
                document.getElementById('article-category').value = post.category || '';
                document.getElementById('article-tags').value = post.tags || '';
                document.getElementById('article-status').value = post.published ? '1' : '0';
                document.getElementById('editor').innerHTML = post.content;
                
                document.getElementById('modal-title').textContent = '编辑文章';
                document.getElementById('editor-modal').classList.add('active');
            } catch (error) {
                console.error('Failed to load article:', error);
                alert('加载文章失败');
            }
        }

        // 保存文章
        async function saveArticle(event) {
            event.preventDefault();
            
            const id = document.getElementById('article-id').value;
            const title = document.getElementById('article-title').value;
            const category = document.getElementById('article-category').value;
            const tags = document.getElementById('article-tags').value;
            const content = document.getElementById('editor').innerHTML;
            const published = document.getElementById('article-status').value === '1';
            
            if (!title || !content) {
                alert('标题和内容不能为空');
                return;
            }
            
            const postData = {
                title: title,
                content: content,
                category: category,
                tags: tags,
                published: published
            };
            
            try {
                let response;
                if (id) {
                    response = await fetch(`/api/posts/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(postData)
                    });
                } else {
                    response = await fetch('/api/posts', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(postData)
                    });
                }
                
                if (response.ok) {
                    alert(id ? '文章更新成功！' : '文章创建成功！');
                    closeEditor();
                    loadArticles();
                    loadStats();
                } else {
                    const error = await response.json();
                    alert('保存失败：' + (error.error || '未知错误'));
                }
            } catch (error) {
                console.error('Failed to save article:', error);
                alert('保存失败，请检查网络连接');
            }
        }

        // 删除文章
        async function deleteArticle(id) {
            if (!confirm('确定要删除这篇文章吗？此操作不可恢复。')) return;
            
            try {
                const response = await fetch(`/api/posts/${id}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    alert('文章已删除');
                    loadArticles();
                    loadStats();
                } else {
                    alert('删除失败');
                }
            } catch (error) {
                console.error('Failed to delete article:', error);
                alert('删除失败，请检查网络连接');
            }
        }

        // 格式化文本
        function formatDoc(cmd, value = null) {
            document.execCommand(cmd, false, value);
            document.getElementById('editor').focus();
        }

        // 工具函数
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        // 点击弹窗外部关闭
        document.getElementById('editor-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeEditor();
            }
        });
    </script>
</body>
</html>
