<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统设置 - 博客管理后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #007aff;
            --success: #34c759;
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --border: #e0e0e0;
            --text: #1d1d1f;
            --radius: 12px;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 24px;
        }

        .header {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 { font-size: 24px; font-weight: 600; }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 32px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text);
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }

        textarea.form-control {
            min-height: 100px;
            resize: vertical;
        }

        .form-help {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--radius);
            text-align: center;
            box-shadow: var(--shadow);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-cog"></i> 系统设置</h1>
            <a href="/admin/index.html" class="btn btn-outline">
                <i class="fas fa-home"></i> 返回首页
            </a>
        </div>

        <!-- 统计信息 -->
        <div class="stats-grid" id="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="stat-posts">-</div>
                <div class="stat-label">文章总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-published">-</div>
                <div class="stat-label">已发布</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-drafts">-</div>
                <div class="stat-label">草稿</div>
            </div>
        </div>

        <!-- 博客设置 -->
        <div class="card">
            <h2 style="margin-bottom: 24px; font-size: 18px;">博客基本信息</h2>
            <form id="settings-form" onsubmit="saveSettings(event)">
                <div class="form-group">
                    <label class="form-label">博客标题</label>
                    <input type="text" id="blog-title" class="form-control" value="blog.sqlboy.top">
                    <div class="form-help">显示在博客首页的标题</div>
                </div>

                <div class="form-group">
                    <label class="form-label">博客描述</label>
                    <textarea id="blog-description" class="form-control" placeholder="简短描述你的博客...">一个现代化的个人博客平台</textarea>
                    <div class="form-help">博客的简介或标语</div>
                </div>

                <div class="form-group">
                    <label class="form-label">作者名称</label>
                    <input type="text" id="author-name" class="form-control" value="Admin">
                    <div class="form-help">默认的作者名称</div>
                </div>

                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> 保存设置
                </button>
            </form>
        </div>

        <!-- 系统信息 -->
        <div class="card">
            <h2 style="margin-bottom: 24px; font-size: 18px;">系统信息</h2>
            <div style="display: grid; gap: 12px;">
                <div style="display: flex; justify-content: space-between; padding: 12px; background: var(--bg); border-radius: 8px;">
                    <span style="color: var(--text-secondary);">后端服务</span>
                    <span style="color: var(--success);"><i class="fas fa-check-circle"></i> 运行中</span>
                </div>
                <div style="display: flex; justify-content: space-between; padding: 12px; background: var(--bg); border-radius: 8px;">
                    <span style="color: var(--text-secondary);">数据库</span>
                    <span style="color: var(--success);"><i class="fas fa-check-circle"></i> SQLite</span>
                </div>
                <div style="display: flex; justify-content: space-between; padding: 12px; background: var(--bg); border-radius: 8px;">
                    <span style="color: var(--text-secondary);">HTTPS</span>
                    <span style="color: var(--success);"><i class="fas fa-check-circle"></i> 已启用</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadStats();
            loadSettings();
        });

        // Load statistics
        async function loadStats() {
            try {
                const response = await fetch('/api/posts/stats');
                const stats = await response.json();
                
                document.getElementById('stat-posts').textContent = stats.total || 0;
                document.getElementById('stat-published').textContent = stats.published || 0;
                document.getElementById('stat-drafts').textContent = stats.drafts || 0;
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        // Load settings
        function loadSettings() {
            // In a real implementation, this would fetch from API
            // For now, using hardcoded values
            document.getElementById('blog-title').value = localStorage.getItem('blogTitle') || 'blog.sqlboy.top';
            document.getElementById('blog-description').value = localStorage.getItem('blogDescription') || '一个现代化的个人博客平台';
            document.getElementById('author-name').value = localStorage.getItem('authorName') || 'Admin';
        }

        // Save settings
        async function saveSettings(event) {
            event.preventDefault();
            
            const title = document.getElementById('blog-title').value;
            const description = document.getElementById('blog-description').value;
            const author = document.getElementById('author-name').value;
            
            // Save to localStorage (in real implementation, save to API)
            localStorage.setItem('blogTitle', title);
            localStorage.setItem('blogDescription', description);
            localStorage.setItem('authorName', author);
            
            // Try to save to API
            try {
                await fetch('/api/config', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title,
                        description,
                        author
                    })
                });
            } catch (error) {
                console.error('Failed to save to API:', error);
            }
            
            alert('设置已保存！');
        }
    </script>
</body>
</html>
