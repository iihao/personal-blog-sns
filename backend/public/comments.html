<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评论管理 - 博客管理后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/admin/admin-layout.css">
    <script src="/admin/admin.js" defer></script>
    <style>
        :root {
            --primary: #007aff;
            --primary-dark: #0056b3;
            --success: #34c759;
            --danger: #ff3b30;
            --warning: #ff9500;
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --border: #e0e0e0;
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --radius: 16px;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ===== 侧边栏布局 ===== */
        .dashboard {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background: var(--card-bg);
            border-right: 1px solid var(--border);
            padding: 32px 24px;
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }

        .main-content {
            margin-left: 280px;
            padding: 40px;
            width: calc(100% - 280px);
            min-height: 100vh;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
        }

        .nav-section { margin-bottom: 32px; }

        .nav-section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            padding-left: 12px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text);
            text-decoration: none;
            transition: all 0.2s ease;
            margin-bottom: 4px;
        }

        .nav-item:hover {
            background: rgba(0, 122, 255, 0.08);
            color: var(--primary);
        }

        .nav-item.active {
            background: linear-gradient(135deg, rgba(0, 122, 255, 0.15), rgba(0, 122, 255, 0.08));
            color: var(--primary);
            font-weight: 600;
        }

        .nav-item i {
            width: 20px;
            text-align: center;
        }

        /* ===== 主内容区 ===== */
        .main-content {
            margin-left: 280px;
            padding: 40px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .page-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 28px;
            font-weight: 700;
        }

        .page-title i {
            color: var(--primary);
            font-size: 32px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-outline {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 2px 8px rgba(0, 122, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.4);
        }

        /* ===== 统计卡片 ===== */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .stat-icon.blue { background: rgba(0, 122, 255, 0.15); color: var(--primary); }
        .stat-icon.green { background: rgba(52, 199, 89, 0.15); color: var(--success); }
        .stat-icon.orange { background: rgba(255, 149, 0, 0.15); color: var(--warning); }

        .stat-info {
            flex: 1;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            line-height: 1;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* ===== 筛选器 ===== */
        .filters-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }

        .filters {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .filter-select, .filter-input {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            background: var(--card-bg);
            color: var(--text);
            min-width: 160px;
        }

        .filter-select:focus, .filter-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }

        /* ===== 评论列表 ===== */
        .comments-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
        }

        .comments-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .comments-title {
            font-size: 18px;
            font-weight: 600;
        }

        .comments-count {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .comment-item {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 16px;
            transition: all 0.2s ease;
            background: var(--card-bg);
        }

        .comment-item:hover {
            border-color: rgba(0, 122, 255, 0.3);
            box-shadow: 0 4px 16px rgba(0, 122, 255, 0.1);
            transform: translateY(-2px);
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .comment-author-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .comment-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 18px;
        }

        .comment-author {
            font-weight: 600;
            font-size: 16px;
            color: var(--text);
        }

        .comment-email {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .comment-meta {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .comment-date {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .status-approved {
            background: rgba(52, 199, 89, 0.15);
            color: var(--success);
        }

        .status-pending {
            background: rgba(255, 149, 0, 0.15);
            color: var(--warning);
        }

        .comment-content {
            background: var(--bg);
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            line-height: 1.7;
            color: var(--text);
        }

        .comment-post {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: rgba(0, 122, 255, 0.08);
            color: var(--primary);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 16px;
            text-decoration: none;
            transition: all 0.2s;
        }

        .comment-post:hover {
            background: rgba(0, 122, 255, 0.15);
        }

        .comment-post i {
            font-size: 12px;
        }

        .comment-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .action-btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .action-btn-approve {
            background: rgba(52, 199, 89, 0.15);
            color: var(--success);
        }

        .action-btn-approve:hover {
            background: rgba(52, 199, 89, 0.25);
        }

        .action-btn-delete {
            background: rgba(255, 59, 48, 0.15);
            color: var(--danger);
        }

        .action-btn-delete:hover {
            background: rgba(255, 59, 48, 0.25);
        }

        /* ===== 空状态 ===== */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 72px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state h3 {
            font-size: 20px;
            color: var(--text);
            margin-bottom: 8px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 1024px) {
            .dashboard {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .main-content {
                margin-left: 0;
                padding: 24px;
            }
        }

        @media (max-width: 768px) {
            .page-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }

            .header-actions {
                width: 100%;
            }

            .stats-row {
                grid-template-columns: 1fr;
            }

            .filters {
                flex-direction: column;
            }

            .filter-select, .filter-input {
                width: 100%;
            }

            .comment-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .comment-actions {
                flex-direction: column;
            }

            .action-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- 移动端菜单按钮 -->
    <button class="menu-toggle" aria-label="切换菜单">
        <span></span>
        <span></span>
        <span></span>
    </button>
    
    <!-- 遮罩层 -->
    <div class="sidebar-overlay"></div>
    
    <div class="dashboard-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-pen-fancy"></i>
                </div>
                <span class="logo-text">博客管理</span>
            </div>

            <nav class="nav-section">
                <div class="nav-section-title">内容管理</div>
                <a href="/admin/" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>仪表盘</span>
                </a>
                <a href="/admin/articles.html" class="nav-item">
                    <i class="fas fa-newspaper"></i>
                    <span>文章管理</span>
                </a>
                <a href="/admin/media.html" class="nav-item">
                    <i class="fas fa-images"></i>
                    <span>媒体库</span>
                </a>
                <a href="/admin/comments.html" class="nav-item active">
                    <i class="fas fa-comments"></i>
                    <span>评论管理</span>
                </a>
            </nav>

            <nav class="nav-section">
                <div class="nav-section-title">系统</div>
                <a href="/admin/settings.html" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>系统设置</span>
                </a>
                <a href="/" class="nav-item" target="_blank">
                    <i class="fas fa-external-link-alt"></i>
                    <span>查看站点</span>
                </a>
            </nav>
        </aside>

        <!-- 主内容 -->
        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">
                    <i class="fas fa-comments"></i>
                    评论管理
                </h1>
                <div class="header-actions">
                    <button class="btn btn-outline" onclick="loadComments()">
                        <i class="fas fa-sync"></i> 刷新
                    </button>
                    <a href="/admin/" class="btn btn-outline">
                        <i class="fas fa-home"></i> 返回首页
                    </a>
                </div>
            </div>

            <!-- 统计卡片 -->
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-icon blue">
                        <i class="fas fa-comments"></i>
                    </div>
                    <div class="stat-info">
                        <div class="stat-value" id="stat-total">0</div>
                        <div class="stat-label">总评论数</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="stat-info">
                        <div class="stat-value" id="stat-approved">0</div>
                        <div class="stat-label">已通过</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon orange">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div class="stat-info">
                        <div class="stat-value" id="stat-pending">0</div>
                        <div class="stat-label">待审核</div>
                    </div>
                </div>
            </div>

            <!-- 筛选器 -->
            <div class="filters-card">
                <div class="filters">
                    <div class="filter-group">
                        <label class="filter-label">状态筛选</label>
                        <select class="filter-select" id="status-filter" onchange="loadComments()">
                            <option value="all">全部状态</option>
                            <option value="approved">已通过</option>
                            <option value="pending">待审核</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">搜索</label>
                        <input type="text" class="filter-input" id="search-input" 
                               placeholder="搜索作者或内容..." oninput="debounceSearch()">
                    </div>
                </div>
            </div>

            <!-- 评论列表 -->
            <div class="comments-card">
                <div class="comments-header">
                    <div>
                        <h2 class="comments-title">评论列表</h2>
                        <span class="comments-count" id="comments-count">共 0 条评论</span>
                    </div>
                </div>

                <div id="comments-list">
                    <div class="empty-state">
                        <i class="fas fa-spinner fa-spin"></i>
                        <h3>加载中...</h3>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let allComments = [];
        let searchTimer = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadComments();
        });

        // 加载评论
        async function loadComments() {
            try {
                const response = await fetch('/api/comments');
                const data = await response.json();
                allComments = data.comments || [];
                renderComments(filterComments());
                updateStats();
            } catch (error) {
                console.error('Failed to load comments:', error);
                document.getElementById('comments-list').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>加载失败</h3>
                        <p>请刷新页面重试</p>
                    </div>
                `;
            }
        }

        // 筛选评论
        function filterComments() {
            const status = document.getElementById('status-filter').value;
            const search = document.getElementById('search-input').value.toLowerCase();

            return allComments.filter(comment => {
                // 状态筛选 (API 返回 status: 'approved' 或 'pending')
                const isApproved = comment.status === 'approved';
                if (status === 'approved' && !isApproved) return false;
                if (status === 'pending' && isApproved) return false;

                // 搜索筛选
                if (search) {
                    const matchAuthor = (comment.author_name || '').toLowerCase().includes(search);
                    const matchContent = (comment.content || '').toLowerCase().includes(search);
                    const matchEmail = (comment.author_email || '').toLowerCase().includes(search);
                    if (!matchAuthor && !matchContent && !matchEmail) return false;
                }

                return true;
            });
        }

        // 渲染评论
        function renderComments(comments) {
            const container = document.getElementById('comments-list');
            document.getElementById('comments-count').textContent = `共 ${comments.length} 条评论`;

            if (comments.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-comment-slash"></i>
                        <h3>暂无评论</h3>
                        <p>当有用户评论时会显示在这里</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = comments.map(comment => `
                <div class="comment-item">
                    <div class="comment-header">
                        <div class="comment-author-info">
                            <div class="comment-avatar">
                                ${(comment.author_name || 'A').charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <div class="comment-author">${escapeHtml(comment.author_name || '匿名')}</div>
                                ${comment.author_email ? `<div class="comment-email">${escapeHtml(comment.author_email)}</div>` : ''}
                            </div>
                        </div>
                        <div class="comment-meta">
                            <span class="comment-date">
                                <i class="far fa-clock"></i> ${formatDate(comment.created_at)}
                            </span>
                            <span class="status-badge ${comment.status === 'approved' ? 'status-approved' : 'status-pending'}">
                                <i class="fas ${comment.status === 'approved' ? 'fa-check-circle' : 'fa-clock'}"></i>
                                ${comment.status === 'approved' ? '已通过' : '待审核'}
                            </span>
                        </div>
                    </div>

                    ${comment.post_title ? `
                        <a href="/post/${comment.post_id}" target="_blank" class="comment-post">
                            <i class="fas fa-newspaper"></i>
                            ${escapeHtml(comment.post_title)}
                        </a>
                    ` : ''}

                    <div class="comment-content">${escapeHtml(comment.content)}</div>

                    <div class="comment-actions">
                        ${comment.status !== 'approved' ? `
                            <button class="action-btn action-btn-approve" onclick="approveComment(${comment.id})">
                                <i class="fas fa-check"></i> 通过
                            </button>
                        ` : ''}
                        <button class="action-btn action-btn-delete" onclick="deleteComment(${comment.id})">
                            <i class="fas fa-trash"></i> 删除
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // 更新统计
        function updateStats() {
            const total = allComments.length;
            const approved = allComments.filter(c => c.status === 'approved').length;
            const pending = total - approved;

            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-approved').textContent = approved;
            document.getElementById('stat-pending').textContent = pending;
        }

        // 通过评论
        async function approveComment(id) {
            if (!confirm('确定要通过这条评论吗？')) return;

            try {
                const response = await fetch(`/api/comments/${id}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ approved: true })
                });

                if (response.ok) {
                    alert('评论已通过');
                    loadComments();
                } else {
                    const error = await response.json();
                    alert('操作失败：' + (error.message || '未知错误'));
                }
            } catch (error) {
                console.error('Approve error:', error);
                alert('操作失败，请重试');
            }
        }

        // 删除评论
        async function deleteComment(id) {
            if (!confirm('确定要删除这条评论吗？此操作不可恢复。')) return;

            try {
                const response = await fetch(`/api/comments/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    alert('评论已删除');
                    loadComments();
                } else {
                    alert('删除失败');
                }
            } catch (error) {
                console.error('Delete error:', error);
                alert('删除失败，请重试');
            }
        }

        // 搜索防抖
        function debounceSearch() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                renderComments(filterComments());
            }, 300);
        }

        // 工具函数
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            if (minutes < 1) return '刚刚';
            if (minutes < 60) return `${minutes}分钟前`;
            if (hours < 24) return `${hours}小时前`;
            if (days < 7) return `${days}天前`;
            
            return date.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
    </script>
</body>
</html>
