<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评论管理 - 博客管理后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #007aff;
            --success: #34c759;
            --danger: #ff3b30;
            --warning: #ff9500;
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --border: #e0e0e0;
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --radius: 12px;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        .header {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 { font-size: 24px; font-weight: 600; }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
        }

        .comment-item {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
            transition: all 0.2s;
        }

        .comment-item:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(0,122,255,0.1);
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .comment-author {
            font-weight: 600;
            font-size: 16px;
        }

        .comment-meta {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .comment-content {
            line-height: 1.6;
            margin-bottom: 16px;
            color: var(--text);
        }

        .comment-post {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            padding: 8px 12px;
            background: var(--bg);
            border-radius: 6px;
        }

        .comment-post a {
            color: var(--primary);
            text-decoration: none;
        }

        .comment-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .action-btn.delete {
            background: rgba(255, 59, 48, 0.1);
            color: var(--danger);
        }

        .action-btn.delete:hover {
            background: rgba(255, 59, 48, 0.2);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-approved {
            background: rgba(52, 199, 89, 0.15);
            color: var(--success);
        }

        .status-pending {
            background: rgba(255, 149, 0, 0.15);
            color: var(--warning);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .filter-select {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            background: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-comments"></i> 评论管理</h1>
            <a href="/admin/articles.html" class="btn btn-outline">
                <i class="fas fa-arrow-left"></i> 返回文章管理
            </a>
        </div>

        <div class="card">
            <div class="filters">
                <select class="filter-select" id="status-filter" onchange="loadComments()">
                    <option value="all">全部状态</option>
                    <option value="approved">已通过</option>
                    <option value="pending">待审核</option>
                </select>
            </div>

            <div id="comments-list">
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>加载中...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', loadComments);

        async function loadComments() {
            try {
                const response = await fetch('/api/comments');
                const data = await response.json();
                renderComments(data.comments || []);
            } catch (error) {
                console.error('Failed to load comments:', error);
                document.getElementById('comments-list').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>加载失败</p>
                    </div>
                `;
            }
        }

        function renderComments(comments) {
            const container = document.getElementById('comments-list');
            
            if (comments.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-comment-slash"></i>
                        <p>暂无评论</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = comments.map(comment => `
                <div class="comment-item">
                    <div class="comment-header">
                        <div>
                            <div class="comment-author">${escapeHtml(comment.author_name || '匿名')}</div>
                            ${comment.author_email ? `<div style="font-size: 13px; color: var(--text-secondary);">${escapeHtml(comment.author_email)}</div>` : ''}
                        </div>
                        <div class="comment-meta">
                            <span>${formatDate(comment.created_at)}</span>
                            <span class="status-badge ${comment.approved ? 'status-approved' : 'status-pending'}">
                                ${comment.approved ? '已通过' : '待审核'}
                            </span>
                        </div>
                    </div>
                    
                    ${comment.post_title ? `
                        <div class="comment-post">
                            评论于文章：<a href="/post/${comment.post_id}" target="_blank">${escapeHtml(comment.post_title)}</a>
                        </div>
                    ` : ''}
                    
                    <div class="comment-content">${escapeHtml(comment.content)}</div>
                    
                    <div class="comment-actions">
                        <button class="action-btn delete" onclick="deleteComment(${comment.id})">
                            <i class="fas fa-trash"></i> 删除
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function deleteComment(id) {
            if (!confirm('确定要删除这条评论吗？')) return;

            try {
                const response = await fetch(`/api/comments/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    alert('评论已删除');
                    loadComments();
                } else {
                    alert('删除失败');
                }
            } catch (error) {
                console.error('Delete error:', error);
                alert('删除失败，请检查网络连接');
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN');
        }
    </script>
</body>
</html>
