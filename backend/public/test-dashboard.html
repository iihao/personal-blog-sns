<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f7; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
        .stat-value { font-size: 48px; font-weight: 700; color: #1d1d1f; }
        .stat-label { color: #86868b; margin-top: 8px; font-size: 14px; }
        .loading { text-align: center; padding: 40px; color: #86868b; }
        .error { background: #ffe5e5; color: #ff3b30; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .debug { background: #fff; padding: 20px; border-radius: 8px; margin-top: 20px; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
    <h1>仪表盘数据测试</h1>
    
    <div id="loading" class="loading">
        <p>正在加载数据...</p>
    </div>
    
    <div id="error" style="display:none;"></div>
    
    <div class="stats" id="stats" style="display:none;">
        <div class="stat-card">
            <div class="stat-value" id="stat-total">-</div>
            <div class="stat-label">文章总数</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-published">-</div>
            <div class="stat-label">已发布</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-drafts">-</div>
            <div class="stat-label">草稿</div>
        </div>
    </div>
    
    <div class="debug" id="debug"></div>

    <script>
        const debug = (msg) => {
            const el = document.getElementById('debug');
            el.innerHTML += `<div>${msg}</div>`;
            console.log(msg);
        };

        async function loadData() {
            try {
                debug('开始加载数据...');
                
                // 测试 API 连接
                debug('1. 请求 /api/posts...');
                const response = await fetch('/api/posts');
                debug(`   状态码：${response.status}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                debug(`2. 收到数据：${JSON.stringify(data).substring(0, 100)}...`);
                
                const posts = data.posts || [];
                debug(`3. 文章数量：${posts.length}`);
                
                const total = posts.length;
                const published = posts.filter(p => p.status === 'published').length;
                const drafts = posts.filter(p => p.status === 'draft').length;
                
                debug(`4. 统计结果 - 总数：${total}, 已发布：${published}, 草稿：${drafts}`);
                
                // 更新 UI
                document.getElementById('stat-total').textContent = total;
                document.getElementById('stat-published').textContent = published;
                document.getElementById('stat-drafts').textContent = drafts;
                
                // 显示结果
                document.getElementById('loading').style.display = 'none';
                document.getElementById('stats').style.display = 'grid';
                
                debug('✅ 数据加载完成！');
                
            } catch (error) {
                debug(`❌ 错误：${error.message}`);
                document.getElementById('loading').style.display = 'none';
                const errorEl = document.getElementById('error');
                errorEl.style.display = 'block';
                errorEl.textContent = `加载失败：${error.message}`;
            }
        }

        // 页面加载时执行
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
