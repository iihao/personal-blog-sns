<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>媒体库 - 博客管理后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #007aff;
            --primary-dark: #0056b3;
            --success: #34c759;
            --danger: #ff3b30;
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --border: #e0e0e0;
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --radius: 12px;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .header {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 40px;
            text-align: center;
            margin-bottom: 24px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(0, 122, 255, 0.05);
        }

        .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(0, 122, 255, 0.1);
        }

        .upload-icon {
            font-size: 48px;
            color: var(--primary);
            margin-bottom: 16px;
        }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .media-item {
            position: relative;
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.2s;
            aspect-ratio: 1;
        }

        .media-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }

        .media-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
        }

        .media-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 12px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .media-item:hover .media-overlay {
            opacity: 1;
        }

        .media-actions {
            display: flex;
            gap: 8px;
        }

        .media-action-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .media-action-btn.copy {
            background: var(--primary);
            color: white;
        }

        .media-action-btn.delete {
            background: var(--danger);
            color: white;
        }

        .media-info {
            padding: 12px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex !important;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
        }

        .modal-content img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: var(--radius);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 32px;
            color: white;
            cursor: pointer;
            background: none;
            border: none;
        }

        /* Progress Bar */
        .progress-container {
            display: none;
            margin-top: 16px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        @media (max-width: 768px) {
            .media-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-images"></i> 媒体库</h1>
            <a href="/admin/articles.html" class="btn btn-outline">
                <i class="fas fa-arrow-left"></i> 返回文章管理
            </a>
        </div>

        <div class="card">
            <!-- Upload Area -->
            <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
                <div class="upload-icon">
                    <i class="fas fa-cloud-upload-alt"></i>
                </div>
                <h3>点击或拖拽上传图片</h3>
                <p style="color: var(--text-secondary); margin-top: 8px;">支持 JPG、PNG、GIF、WebP 格式</p>
                <input type="file" id="file-input" accept="image/*" multiple style="display: none;" onchange="handleFiles(this.files)">
                
                <div class="progress-container" id="progress-container">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <div class="progress-text" id="progress-text">上传中...</div>
                </div>
            </div>

            <!-- Media Grid -->
            <div id="media-grid" class="media-grid">
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>加载中...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Image Preview Modal -->
    <div id="preview-modal" class="modal" onclick="closeModal()">
        <button class="close-modal">&times;</button>
        <div class="modal-content">
            <img id="preview-image" src="" alt="Preview">
        </div>
    </div>

    <script>
        let mediaItems = [];

        document.addEventListener('DOMContentLoaded', () => {
            loadMedia();
            setupDragDrop();
        });

        // Load media files
        async function loadMedia() {
            try {
                const response = await fetch('/api/media');
                const data = await response.json();
                mediaItems = data.media || [];
                renderMedia();
            } catch (error) {
                console.error('Failed to load media:', error);
                document.getElementById('media-grid').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>加载失败</p>
                    </div>
                `;
            }
        }

        // Render media grid
        function renderMedia() {
            const grid = document.getElementById('media-grid');
            
            if (mediaItems.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-image"></i>
                        <p>暂无媒体文件</p>
                        <p style="font-size: 14px; margin-top: 8px;">点击上方区域上传图片</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = mediaItems.map(item => `
                <div class="media-item">
                    <img src="${item.url}" alt="${item.filename}" onclick="previewImage('${item.url}')">
                    <div class="media-overlay">
                        <div class="media-actions">
                            <button class="media-action-btn copy" onclick="copyUrl('${item.url}')" title="复制链接">
                                <i class="fas fa-copy"></i>
                            </button>
                            <button class="media-action-btn delete" onclick="deleteMedia(${item.id})" title="删除">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                    <div class="media-info">
                        <div style="font-weight: 500; color: var(--text);">${item.filename}</div>
                        <div>${formatSize(item.size)}</div>
                    </div>
                </div>
            `).join('');
        }

        // Setup drag and drop
        function setupDragDrop() {
            const uploadArea = document.getElementById('upload-area');
            
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                uploadArea.addEventListener(eventName, preventDefaults, false);
            });

            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }

            ['dragenter', 'dragover'].forEach(eventName => {
                uploadArea.addEventListener(eventName, () => {
                    uploadArea.classList.add('dragover');
                }, false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                uploadArea.addEventListener(eventName, () => {
                    uploadArea.classList.remove('dragover');
                }, false);
            });

            uploadArea.addEventListener('drop', (e) => {
                const dt = e.dataTransfer;
                const files = dt.files;
                handleFiles(files);
            }, false);
        }

        // Handle file upload
        async function handleFiles(files) {
            if (files.length === 0) return;

            const progressContainer = document.getElementById('progress-container');
            const progressFill = document.getElementById('progress-fill');
            const progressText = document.getElementById('progress-text');
            
            progressContainer.style.display = 'block';
            progressFill.style.width = '0%';
            progressText.textContent = `上传中 0/${files.length}`;

            let uploaded = 0;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                
                // Validate file type
                if (!file.type.startsWith('image/')) {
                    alert(`${file.name} 不是图片文件`);
                    continue;
                }

                // Validate file size (max 5MB)
                if (file.size > 5 * 1024 * 1024) {
                    alert(`${file.name} 超过 5MB 限制`);
                    continue;
                }

                const formData = new FormData();
                formData.append('file', file);

                try {
                    const response = await fetch('/api/media', {
                        method: 'POST',
                        body: formData
                    });

                    if (response.ok) {
                        const result = await response.json();
                        mediaItems.unshift(result);
                        uploaded++;
                    } else {
                        const error = await response.json();
                        alert(`上传失败：${error.error}`);
                    }
                } catch (error) {
                    console.error('Upload error:', error);
                    alert(`上传失败：${error.message}`);
                }

                // Update progress
                const progress = ((i + 1) / files.length) * 100;
                progressFill.style.width = `${progress}%`;
                progressText.textContent = `上传中 ${i + 1}/${files.length}`;
            }

            renderMedia();
            
            setTimeout(() => {
                progressContainer.style.display = 'none';
            }, 1000);

            // Reset file input
            document.getElementById('file-input').value = '';
        }

        // Delete media
        async function deleteMedia(id) {
            if (!confirm('确定要删除这个文件吗？')) return;

            try {
                const response = await fetch(`/api/media/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    mediaItems = mediaItems.filter(item => item.id !== id);
                    renderMedia();
                } else {
                    alert('删除失败');
                }
            } catch (error) {
                console.error('Delete error:', error);
                alert('删除失败，请检查网络连接');
            }
        }

        // Copy URL
        function copyUrl(url) {
            const fullUrl = window.location.origin + url;
            navigator.clipboard.writeText(fullUrl).then(() => {
                alert('链接已复制到剪贴板');
            }).catch(err => {
                console.error('Failed to copy:', err);
                // Fallback
                const textArea = document.createElement('textarea');
                textArea.value = fullUrl;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                alert('链接已复制到剪贴板');
            });
        }

        // Preview image
        function previewImage(url) {
            document.getElementById('preview-image').src = url;
            document.getElementById('preview-modal').classList.add('active');
        }

        // Close modal
        function closeModal() {
            document.getElementById('preview-modal').classList.remove('active');
        }

        // Format file size
        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Close modal on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
